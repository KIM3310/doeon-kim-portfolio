  <text x="832" y="350" fill="#DCE5EE" font-family="Helvetica, Arial, sans-serif" font-size="18">frontier/runtime claim is repeated.</text>

  <rect x="56" y="436" width="1088" height="248" rx="20" fill="#0F141C" stroke="#303D52"/>
