name: production-smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

concurrency:
  group: production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve production base URL
        run: |
          if [ -n "${PUBLIC_BASE_URL:-}" ]; then
            echo "BASE_URL=$PUBLIC_BASE_URL" >> "$GITHUB_ENV"
          else
            echo "BASE_URL=https://kim3310.github.io/doeon-kim-portfolio" >> "$GITHUB_ENV"
          fi
          sleep 20

      - name: Smoke test production endpoints
        run: |
          set -euo pipefail
          base="${BASE_URL%/}"
          paths=(
            "/"
            "/ads.txt"
            "/robots.txt"
            "/sitemap.xml"
          )

          for path in "${paths[@]}"; do
            ok=0
            for attempt in 1 2 3; do
              code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 "$base$path")
              echo "[$attempt/3] $path -> $code"
              if [ "$code" -ge 200 ] && [ "$code" -lt 400 ]; then
                ok=1
                break
              fi
              sleep 3
            done
            if [ "$ok" -ne 1 ]; then
              echo "Smoke check failed for $path"
              exit 1
            fi
          done
